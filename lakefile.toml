name = "dL-tolcontract"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["DLTolContract"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

# NFM'26 tolerance contracts are a new layer on the whole family, pinned to the
# released milestone tags of the foundations.
#
# dL-lean (library `DLLean`): dL syntax, ⟦·⟧, FV/BV/MBV, coincidence/bound-effect,
# loop induction. Needed by everything.
[[require]]
name = "dL-lean"
git = "https://github.com/UNCC-FORTRESS/dL-formalization-Lean.git"
rev = "v0.1.0-DI"

# dL-qsafety (library `DLQSafety`): the signed safety distance `Dist`, over which
# the quantitative Theorem 2 is stated.
[[require]]
name = "dL-qsafety"
git = "https://github.com/UNCC-FORTRESS/HSCC26-Qsafety-Lean.git"
rev = "v0.1.0-HSCC23"

# dL-caltiming (library `DLCalTiming`): CSF'25 timed Q-safety `TSafe`, the object
# of Theorem 2's Items 4/5.
[[require]]
name = "dL-caltiming"
git = "https://github.com/UNCC-FORTRESS/CSF25-Timed-Qsafety-Lean.git"
rev = "v0.1.0-CSF25"

[[lean_lib]]
name = "DLTolContract"
